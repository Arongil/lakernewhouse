<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Benita & John Katzenellenbogen - Family Stories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 60px;
        }

        .title {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #7f8c8d;
            font-style: italic;
        }

        .quote-container {
            position: relative;
            min-height: 300px;
            margin-bottom: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote-card {
            position: absolute;
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .quote-card.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .quote-text {
            font-size: 1.3em;
            line-height: 1.6;
            color: #2c3e50;
            margin-bottom: 25px;
            font-style: italic;
            position: relative;
        }

        .quote-author {
            font-size: 1.1em;
            color: #3498db;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }

        .quote-author::before {
            content: '—';
            margin-right: 10px;
            color: #95a5a6;
        }

        .navigation-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-button {
            display: inline-block;
            padding: 15px 35px;
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .nav-button:hover {
            transform: translateY(-3px);
        }

        .nav-button:hover::before {
            left: 100%;
        }

        .quote-progress {
            position: absolute;
            bottom: -5px;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #3498db, #e74c3c);
            border-radius: 2px;
            transform-origin: left;
            animation: progress 6s linear infinite;
        }

        @keyframes progress {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2em;
            }
            
            .quote-card {
                padding: 30px 25px;
                margin: 0 10px;
            }
            
            .quote-text {
                font-size: 1.1em;
            }
            
            .navigation-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .nav-button {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Benita & John Katzenellenbogen</h1>
            <p class="subtitle">
            Family Stories & Memories, May 2025
            <br>
            Interviewed by Laker Newhouse
            </p>
        </div>

        <div class="quote-container">
            <div class="quote-progress"></div>
            <!-- Quotes will be dynamically inserted here -->
        </div>

        <div class="navigation-buttons">
            <a href="benita.html" class="nav-button">Benita's interview</a>
            <a href="john.html" class="nav-button">John's interview</a>
        </div>
    </div>

    <script>
        const quotes = [
            {
                text: "My Uncle Jack said, on the spot, “If she needs support to go to graduate school, I’ll pay for her.”",
                author: "Benita"
            },
            {
                text: "Aunt Maidie would make silver dollar pancakes on Sunday—tiny pancakes.",
                author: "Benita"
            },
            {
                text: "John and I became fond of each other, started studying together, playing ping pong. Once, his pants split when he bent down to pick up a ball. Thank goodness we were already dating!",
                author: "Benita"
            },
            {
                text: "When raising Debbie and Rachel, I didn't mind that much of my salary went toward caregivers. It was an investment in our family's future.",
                author: "Benita"
            },
            {
                text: "My mother's family was Jewish, knew they were Jewish, but did nothing much Jewish. My father's family was more conservative, edging toward Orthodox when they first came to the U.S.",
                author: "Benita"
            },
            {
                text: "Don't put off having children forever, if you want them. As you advance, you get busier and have more responsibility. Plus, you have more energy when you're younger.",
                author: "Benita"
            },
            {
                text: "When a dish like that came out, the kids would softly chant, “Eff tzet, eff tzet!” (“F, Z” in German), which meant “Familie zurückhalten,” or “family hold back.” It was their way to signal: don’t take a huge portion, let the guests get enough.",
                author: "John"
            },
            {
                text: "Don't feel like you have to follow in the footsteps of your parents. My father was an art historian, and he knew I really wasn't interested in art, though I did pick up some things.",
                author: "John"
            },
            {
                text: "I found a hammer and a screwdriver, even before I could really walk, went over, and managed to hit the latch until it popped out and the door clicked. My parents were terrified—they thought I'd kill myself with the tools—but I fixed it.",
                author: "John"
            },
            {
                text: "I said, “I bet you don't remember my name.” She replied, “Of course, you're John Katzenellenbogen.” That showed some quick intelligence, and it appealed to me.",
                author: "John"
            },
            {
                text: "I'd become a “gorilla,” scoop Debbie and Rachel up, carry them upstairs, and dump them in their cribs with gentle wrestling. They'd squeal with laughter, then drift straight to sleep.",
                author: "John"
            },
            {
                text: "I have a very loyal Korean collaborator who has been with me for 20 years. He is on top of the day-to-day operations of the lab and some research negotiations. And he says, “As long as you want to work, Dr. K, my job is to help you.”",
                author: "John"
            }
        ];

        let currentQuoteIndex = 0;
        let rotationInterval;
        let progressAnimation;
        let isFirstCard = true;
        let shuffledQuotes = [];

        // Fisher-Yates shuffle algorithm
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function createQuoteCards() {
            const container = document.querySelector('.quote-container');
            
            shuffledQuotes.forEach((quote, index) => {
                const card = document.createElement('div');
                card.className = 'quote-card';
                if (index === 0) card.classList.add('active');
                
                card.innerHTML = `
                    <div class="quote-text">${quote.text}</div>
                    <div class="quote-author">${quote.author}</div>
                `;
                
                container.appendChild(card);
            });
        }

        function showQuote(index) {
            const cards = document.querySelectorAll('.quote-card');
            
            // Remove active class from all cards
            cards.forEach(card => card.classList.remove('active'));
            
            // Add active class to current card
            cards[index].classList.add('active');
            
            currentQuoteIndex = index;
        }

        function nextQuote() {
            const nextIndex = (currentQuoteIndex + 1) % shuffledQuotes.length;
            showQuote(nextIndex);
        }

        function startRotation() {
            // First card shows for 2 seconds, subsequent cards for 6 seconds
            const timeout = isFirstCard ? 2000 : 6000;
            rotationInterval = setTimeout(() => {
                nextQuote();
                isFirstCard = false;
                // Start regular 5-second interval after first card
                rotationInterval = setInterval(nextQuote, 6000);
            }, timeout);
        }

        function resetProgressAnimation() {
            const progressBar = document.querySelector('.quote-progress');
            const duration = isFirstCard ? '2s' : '5s';
            progressBar.style.animation = 'none';
            progressBar.offsetHeight; // Trigger reflow
            progressBar.style.animation = `progress ${duration} linear infinite`;
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            // Shuffle quotes at the beginning
            shuffledQuotes = shuffleArray(quotes);
            
            createQuoteCards();
            startRotation();
            
            // Reset progress animation - first one at 2s, then every 5s
            setTimeout(() => {
                resetProgressAnimation();
                setInterval(resetProgressAnimation, 6000);
            }, 2000);
        });

        // Pause rotation on hover
        document.querySelector('.quote-container').addEventListener('mouseenter', () => {
            clearInterval(rotationInterval);
        });

        document.querySelector('.quote-container').addEventListener('mouseleave', () => {
            startRotation();
        });
    </script>
</body>
</html>
