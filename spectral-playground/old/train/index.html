<!DOCTYPE html>
<html>
<head>
    <title>Neural Network Example</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script> -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            margin-top: 20px;
            width: 100%;
            height: 300px;
        }
        .controls {
            margin: 20px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input[type="range"] {
            width: 100%;
        }
        select {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: white;
            font-family: 'Roboto', sans-serif;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1976D2;
        }
        button.selected {
            background-color: #1565C0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .value-display {
            font-family: 'Roboto Mono', monospace;
            min-width: 60px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Spectral Playground</h1>
        <div class="controls">
            <div class="control-group">
                <label>
                    learning rate
                    <span class="value-display" id="lrValue">0.01</span>
                </label>
                <input type="range" id="learningRate" min="0.001" max="0.1" step="0.001" value="0.01">
            </div>
            <div class="control-group">
                <label>
                    beta1
                    <span class="value-display" id="momentumValue">0.9</span>
                </label>
                <input type="range" id="momentum" min="0" max="0.9" step="0.01" value="0.9">
            </div>
            <div class="control-group">
                <label for="lrSchedule">Learning rate schedule</label>
                <select id="lrSchedule">
                    <option value="none">none</option>
                    <option value="linear">linear</option>
                </select>
            </div>
            <div class="control-group">
                <div class="button-group">
                    <button id="sgdButton" class="selected">SGD</button>
                    <button id="adamButton">AdamW</button>
                    <button id="muonButton">Muon</button>
                </div>
                <button id="trainButton">Train!</button>
            </div>
        </div>
        <p>Training progress:</p>
        <canvas id="lossPlot"></canvas>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
