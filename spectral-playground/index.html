<!DOCTYPE html>
<html>
<head>
    <title>Spectral Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Spectral Playground</h1>
    <div class="controls">
        <select id="accum">
            <option value="1">batch 0.5M</option>
            <option value="4">batch 2M</option>
            <option value="16">batch 6M</option>
        </select>
        <select id="step">
            <option value="100">step 100</option>
            <option value="200">step 200</option>
            <option value="400">step 400</option>
            <option value="800">step 800</option>
            <option value="1600">step 1600</option>
        </select>
        <select id="layer">
            <option value="0">layer 0</option>
            <option value="1">layer 1</option>
            <option value="2">layer 2</option>
            <option value="3">layer 3</option>
            <option value="4">layer 4</option>
            <option value="5">layer 5</option>
            <option value="6">layer 6</option>
            <option value="7">layer 7</option>
            <option value="8">layer 8</option>
            <option value="9">layer 9</option>
            <option value="10">layer 10</option>
            <option value="11">layer 11</option>
        </select>
        <select id="matrix">
            <option value="q">query</option>
            <option value="k">key</option>
            <option value="v">value</option>
            <option value="c_proj">att out</option>
            <option value="mlp_fc">mlp in</option>
            <option value="mlp_proj">mlp out</option>
        </select>
        <button id="load">Load</button>
    </div>
    <div class="canvas-container">
        <div id="y-label">Count</div>
        <canvas id="canvas" width="400" height="400"></canvas>
        <div class="x-labels">
            <span>10⁻⁶</span>
            <span>10⁻⁴</span>
            <span>10⁻²</span>
            <span>10⁰</span>
        </div>
        <div id="x-label">Singular value</div>
    </div>
    <script src="draw.js"></script>
    <script src="histogram.js"></script>
</body>
</html>
